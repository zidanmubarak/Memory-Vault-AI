services:
  memory-vault-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: memory-vault-ai:local
    ports:
      - "8000:8000"
    environment:
      ML_STORAGE_BACKEND: qdrant
      ML_METADATA_BACKEND: sqlite
      ML_QDRANT_URL: http://qdrant:6333
      ML_QDRANT_COLLECTION: memory_vault
      ML_SQLITE_PATH: /app/data/memory.db
      ML_EMBEDDING_MODEL: all-MiniLM-L6-v2
      ML_DEFAULT_TOKEN_BUDGET: 2000
      ML_COMPRESSION_THRESHOLD: 10
      ML_API_KEY: ${ML_API_KEY:-}
    volumes:
      - memory_vault_data:/app/data
    depends_on:
      - qdrant
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  memory_vault_data:
  qdrant_data:
