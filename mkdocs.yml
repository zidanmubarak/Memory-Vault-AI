site_name: Memory Vault AI
site_description: Persistent, context-aware memory system for AI assistants.
site_url: https://zidanmubarak.github.io/Memory-Vault-AI/
repo_url: https://github.com/zidanmubarak/Memory-Vault-AI
repo_name: zidanmubarak/Memory-Vault-AI
docs_dir: docs
site_dir: site
use_directory_urls: true

plugins:
  - search

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
      primary: teal
      accent: amber

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - assets/stylesheets/extra.css

exclude_docs: |
  adr/ADR-000-template.md

nav:
  - Home: index.md
  - Guides:
      - SDK Guide: guides/SDK_GUIDE.md
      - Configuration: guides/CONFIGURATION.md
      - Deployment: guides/DEPLOYMENT.md
      - MCP Integration: guides/MCP_INTEGRATION.md
      - Benchmarking: guides/BENCHMARKING.md
      - Plugin System: guides/PLUGIN_SYSTEM.md
  - API:
      - REST API Spec: api/API_SPEC.md
      - SDK API Spec: api/SDK_API_SPEC.md
  - Architecture:
      - System Architecture: architecture/ARCHITECTURE.md
  - Specifications:
      - Memory Logic: specs/MEMORY_LOGIC.md
      - Database Schema: specs/DATABASE_SCHEMA.md
      - Plugin System Spec: specs/PLUGIN_SYSTEM.md
  - ADR:
      - ADR-001 Chroma as Default Vector Store: adr/ADR-001-chroma-as-default-vector-store.md
      - ADR-002 Chunking Strategy: adr/ADR-002-chunking-strategy.md
      - ADR-003 Four Memory Types: adr/ADR-003-four-memory-types.md
      - ADR-004 Async First Design: adr/ADR-004-async-first-design.md
      - ADR-005 Tiktoken for Token Counting: adr/ADR-005-tiktoken-for-token-counting.md
      - ADR-006 Chroma Collection Strategy: adr/ADR-006-chroma-collection-strategy.md
      - ADR-007 Postgres for Multi-Instance: adr/ADR-007-postgres-for-multi-instance.md
